---
- hosts: localhost
  gather_facts: no
  tasks:
    - name: Check if manifests exist
      stat:
        path: "{{ item }}"
      register: manifest_stat
      loop:
        - k8s/deployment.yml
        - k8s/service.yml

    - name: Fail if any manifest is missing
      fail:
        msg: "Missing manifest: {{ item.invocation.module_args.path }}"
      when: not item.stat.exists
      loop: "{{ manifest_stat.results }}"

    - name: Apply Kubernetes manifests
      community.kubernetes.k8s:
        state: present
        src: "{{ item }}"
      loop:
        - k8s/deployment.yml
        - k8s/service.yml

