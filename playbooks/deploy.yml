---
- hosts: localhost
  gather_facts: no
  tasks:
    - name: Check if manifests exist
      stat:
        path: "{{ playbook_dir }}/../k8s/{{ item }}"
      register: manifest_stat
      loop:
        - deployment.yml
        - service.yml

    - name: Fail if any manifest is missing
      fail:
        msg: "Missing manifest: {{ item.invocation.module_args.path }}"
      when: not item.stat.exists
      loop: "{{ manifest_stat.results }}"

    - name: Apply Kubernetes manifests
      kubernetes.core.k8s:
        state: present
        validate_certs: no
        definition: "{{ lookup('file', playbook_dir + '/../k8s/' + item) | from_yaml }}"
      loop:
        - deployment.yml
        - service.yml

